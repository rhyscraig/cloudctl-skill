name: Tests

# Runner pool strategy:
#   Default (vars.RUNNER_LABEL not set): ubuntu-latest  → consumes GitHub minutes
#   When minutes low:  set RUNNER_LABEL=self-hosted via toggle_runner.sh → OCI A1 free instance
#
# To switch:  bash ~/.oci/toggle_runner.sh oci     (OCI, no minutes)
#             bash ~/.oci/toggle_runner.sh github   (back to GitHub-hosted)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    # Uses OCI self-hosted runner when RUNNER_LABEL variable is set; falls back to ubuntu-latest
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    # Cross-platform matrix only runs on GitHub-hosted runners (minutes available).
    # On OCI (self-hosted/ARM64) we run once — linux only.
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ vars.RUNNER_LABEL && fromJSON('["3.12"]') || fromJSON('["3.12", "3.13"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Run tests
        run: |
          poetry run pytest tests/ \
            --ignore=tests/test_mcp_server.py \
            --ignore=tests/test_mcp_error_paths.py \
            -v --cov=cloudctl_skill --cov-report=term-missing

  type-check:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Type check
        run: |
          poetry run mypy src/cloudctl_skill/ --strict

  lint:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Lint with ruff
        run: |
          poetry run ruff check src/ tests/

      - name: Format check with black
        run: |
          poetry run black --check src/ tests/

      - name: Security check with bandit
        run: |
          poetry run bandit -r src/cloudctl_skill/ -ll

  security:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Check dependencies
        run: |
          poetry run pip-audit
