[pytest]
# Pytest configuration for CloudctlSkill

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider

# Asyncio mode
asyncio_mode = auto

# Test paths
testpaths = tests

# Markers
markers =
    asyncio: async test
    integration: integration test
    security: security test
    unit: unit test
    slow: slow running test
